name: tests
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pip Setup
        run: python -m pip install --upgrade pip
      - name: Dependencies installation
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest