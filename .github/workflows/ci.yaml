name: ci
on:
  push:
      branches:
        - main
  pull_request:
    branches:
      - main
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Pip Setup
        run: python -m pip install --upgrade pip
      - name: Dependencies installation
        run: pip install -r requirements.txt
      - name: Ruff validation
        run: python -m ruff check .
  tests:
    runs-on: ubuntu-latest
    needs: ruff
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Pip Setup
        run: python -m pip install --upgrade pip
      - name: Dependencies installation
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest
  docker:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: build docker image
        run: docker build -t resnet-fracture .
